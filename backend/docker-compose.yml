# ============================================================
# Bitshake Smart Meter Dashboard — Docker Compose
# Deploy on Oracle Cloud VM (A1 4 OCPU / 24GB RAM)
# ============================================================

services:
  # ── Caddy Reverse Proxy (auto-SSL with Let's Encrypt) ────
  caddy:
    image: caddy:2-alpine
    container_name: bitshake-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - bitshake-net



  # ── TimescaleDB (PostgreSQL with time-series extension) ──
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: bitshake-timescaledb
    restart: unless-stopped
    # NOT exposed to host — only accessible within Docker network
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-bitshake}
      POSTGRES_USER: ${DB_USER:-bitshake}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bitshake}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitshake-net

  # ── API Server (Fastify + MQTT Bridge) ───────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bitshake-api
    restart: unless-stopped
    # NOT exposed to host — only accessible via Caddy
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bitshake}
      DB_USER: ${DB_USER:-bitshake}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST is required}
      MQTT_USER: ${MQTT_USER:-bitshake}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      MQTT_TOPIC: ${MQTT_TOPIC:-tele/+/SENSOR}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - bitshake-net

volumes:
  caddy_data:
  caddy_config:
  timescaledb_data:

networks:
  bitshake-net:
    driver: bridge
