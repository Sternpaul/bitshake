# ============================================================
# Bitshake Smart Meter Dashboard — Docker Compose
# Deploy on Oracle Cloud VM (A1 4 OCPU / 24GB RAM)
# ============================================================

services:
  # ── Cloudflare Tunnel ──────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    container_name: bitshake-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}
    depends_on:
      - api
    networks:
      - bitshake-net  # ── TimescaleDB (PostgreSQL with time-series extension) ──
  timescaledb:
    image: timescale/timescaledb:2.28.2-pg16
    container_name: bitshake-timescaledb
    restart: unless-stopped
    # NOT exposed to host — only accessible within Docker network
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-bitshake}
      POSTGRES_USER: ${DB_USER:-bitshake}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bitshake}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitshake-net

  # ── API Server (Fastify + MQTT Bridge) ───────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bitshake-api
    restart: unless-stopped
    # NOT exposed to host — only accessible via Caddy
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bitshake}
      DB_USER: ${DB_USER:-bitshake}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MQTT_HOST: ${MQTT_HOST:?MQTT_HOST is required}
      MQTT_USER: ${MQTT_USER:-bitshake}
      MQTT_PASSWORD: ${MQTT_PASSWORD:?MQTT_PASSWORD is required}
      MQTT_TOPIC: ${MQTT_TOPIC:-tele/+/SENSOR,hm2mqtt/+/device/+/data}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - bitshake-net

  # ── Marstek MQTT Integration ────────────────────────────────
  hame-relay:
    image: ghcr.io/tomquist/hame-relay:latest
    container_name: bitshake-hame-relay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HAME_USER=${HAME_USER}
      - HAME_PASS=${HAME_PASS}
      - MQTT_HOST=${MQTT_HOST}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
    # We generate the config.json on the fly using node to avoid any shell quoting issues
    command: >
      /bin/sh -c '
      mkdir -p /app/config &&
      node -e "
      const fs = require(\"fs\");
      let url = process.env.MQTT_HOST;
      if (process.env.MQTT_USER) {
        url = url.replace(\"://\", \"://\" + process.env.MQTT_USER + \":\" + process.env.MQTT_PASSWORD + \"@\");
      }
      const config = {
        broker_url: url,
        username: process.env.HAME_USER,
        password: process.env.HAME_PASS
      };
      fs.writeFileSync(\"/app/config/config.json\", JSON.stringify(config, null, 2));
      console.log(\"Generated config.json for \" + process.env.HAME_USER);
      " &&
      node /app/dist/main.js
      '
    networks:
      - bitshake-net

  hm2mqtt:
    image: ghcr.io/tomquist/hm2mqtt:latest
    container_name: bitshake-hm2mqtt
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MQTT_BROKER_URL: ${MQTT_HOST}
      MQTT_USERNAME: ${MQTT_USER}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      DEVICE_0: "HMI-1:${MARSTEK_MAC}"
      POLLING_INTERVAL: "15"
    networks:
      - bitshake-net

volumes:
  timescaledb_data:

networks:
  bitshake-net:
    driver: bridge
